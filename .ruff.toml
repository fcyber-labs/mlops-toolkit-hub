# .ruff.toml
[lint]
ignore = [
    "C901",   # Too complex
    "E402",   # Import not at top
    "E501",   # Line too long
    "E702",   # Semicolon
    "F401",   # Unused import
    "F821",   # Undefined name
    "F841",   # Unused variable
    "W291",   # Trailing whitespace
    "W293",   # Blank line whitespace
]

[lint.per-file-ignores]
"**/*.py" = ["C901", "E402", "F401", "F821", "F841"]